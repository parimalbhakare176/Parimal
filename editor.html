<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Visual Editor</title>
    <meta
      name="description"
      content="Visual editor for Parimal Bhakare's portfolio website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Lora:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <main class="editor-layout">
      <aside class="editor-panel">
        <h1>Visual Editor</h1>
        <p class="editor-intro">Update your website with forms. Changes save automatically and apply instantly.</p>

        <section class="editor-section">
          <h2>Basic Info</h2>
          <label>Site Name <input type="text" data-field="siteName" /></label>
          <label>Title Suffix <input type="text" data-field="siteTitleSuffix" /></label>
          <label>Description <textarea rows="3" data-field="description"></textarea></label>
          <label>LinkedIn URL <input type="url" data-field="linkedinUrl" /></label>
          <label>CV URL/Path <input type="text" data-field="cvUrl" /></label>
        </section>

        <section class="editor-section">
          <h2>Hero Section</h2>
          <label>Eyebrow <input type="text" data-field="heroEyebrow" /></label>
          <label>Title <textarea rows="2" data-field="heroTitle"></textarea></label>
          <label>Intro Copy <textarea rows="4" data-field="heroCopy"></textarea></label>
        </section>

        <section class="editor-section">
          <h2>Highlights</h2>
          <label>Stat 1 Value <input type="text" data-field="stat1Value" /></label>
          <label>Stat 1 Label <input type="text" data-field="stat1Label" /></label>
          <label>Stat 2 Value <input type="text" data-field="stat2Value" /></label>
          <label>Stat 2 Label <input type="text" data-field="stat2Label" /></label>
          <label>Stat 3 Value <input type="text" data-field="stat3Value" /></label>
          <label>Stat 3 Label <input type="text" data-field="stat3Label" /></label>
        </section>

        <section class="editor-section">
          <h2>Contact</h2>
          <label>Contact Heading <textarea rows="2" data-field="contactTitle"></textarea></label>
          <label>Location <input type="text" data-field="location" /></label>
          <label>Phone <input type="text" data-field="phone" /></label>
          <label>Primary Email <input type="email" data-field="emailPrimary" /></label>
          <label>Secondary Email <input type="email" data-field="emailSecondary" /></label>
        </section>

        <section class="editor-section">
          <h2>Articles Page</h2>
          <label>Articles Hero Title <textarea rows="2" data-field="articlesTitle"></textarea></label>
          <label>Articles Hero Subtitle <textarea rows="3" data-field="articlesSubtitle"></textarea></label>
        </section>

        <section class="editor-section">
          <h2>Typography</h2>
          <label>Body Font
            <select data-field="fonts.body">
              <option value="'Manrope', sans-serif">Manrope</option>
              <option value="'DM Sans', sans-serif">DM Sans</option>
              <option value="'Lora', serif">Lora</option>
            </select>
          </label>
          <label>Heading Font
            <select data-field="fonts.heading">
              <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
              <option value="'Manrope', sans-serif">Manrope</option>
              <option value="'Lora', serif">Lora</option>
            </select>
          </label>
        </section>

        <section class="editor-section">
          <h2>Colors</h2>
          <label>Background <input type="color" data-field="theme.bg" /></label>
          <label>Text <input type="color" data-field="theme.text" /></label>
          <label>Muted Text <input type="color" data-field="theme.muted" /></label>
          <label>Card <input type="color" data-field="theme.card" /></label>
          <label>Border <input type="color" data-field="theme.border" /></label>
          <label>Accent <input type="color" data-field="theme.accent" /></label>
          <label>Accent Soft <input type="color" data-field="theme.accentSoft" /></label>
        </section>

        <section class="editor-section">
          <h2>Articles</h2>
          <div id="articles-editor-list"></div>
          <button class="btn btn-ghost" type="button" id="add-article">Add Article</button>
        </section>

        <div class="editor-actions">
          <button class="btn btn-solid" type="button" id="save-now">Save</button>
          <button class="btn btn-outline" type="button" id="reset-all">Reset Defaults</button>
          <a class="btn btn-ghost" href="./index.html" target="_blank" rel="noreferrer">Open Portfolio</a>
          <a class="btn btn-ghost" href="./articles.html" target="_blank" rel="noreferrer">Open Articles</a>
        </div>

        <p id="save-status" class="save-status">Ready</p>
      </aside>

      <section class="editor-preview-wrap">
        <div class="preview-toolbar">
          <strong>Live Preview</strong>
          <button class="btn btn-ghost" type="button" id="reload-preview">Reload Preview</button>
        </div>
        <iframe id="preview-frame" title="Portfolio Preview" src="./index.html"></iframe>
      </section>
    </main>

    <script src="./site-settings.js"></script>
    <script src="./editor.js"></script>
  </body>
</html>
